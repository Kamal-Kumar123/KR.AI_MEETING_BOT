<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>KRAI Extension Settings</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, sans-serif;
        max-width: 520px;
        margin: 0 auto;
        padding: 24px;
        background: #0b1020;
        color: #e8eefc;
      }
      h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
      p.sub { color: #9aa8c7; font-size: 0.875rem; margin-bottom: 1.5rem; }
      section {
        background: #121a2f;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      h2 { font-size: 1rem; margin: 0 0 12px; color: #c4cff0; }
      label { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; }
      input[type="text"], select {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border-radius: 8px;
        border: 1px solid #334;
        background: #0b1020;
        color: #fff;
      }
      .field { margin-bottom: 12px; }
      button {
        width: 100%;
        padding: 12px;
        border: 0;
        border-radius: 8px;
        background: #6d5efc;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      .status { margin-top: 12px; font-size: 0.875rem; color: #86efac; }
    </style>
  </head>
  <body>
    <h1>KRAI Extension Settings</h1>
    <p class="sub">Configure recording, uploads, and server URLs.</p>

    <section>
      <h2>Server URLs</h2>
      <div class="field">
        <label>API URL</label>
        <input id="apiUrl" type="text" placeholder="http://localhost:8000" />
      </div>
      <div class="field">
        <label>Frontend URL</label>
        <input id="frontendUrl" type="text" placeholder="http://localhost:3000" />
      </div>
    </section>

    <section>
      <h2>Recording & Processing</h2>
      <label><span>Automatic upload after stop</span><input type="checkbox" id="autoUpload" /></label>
      <label><span>Automatic summary generation</span><input type="checkbox" id="autoSummary" /></label>
      <label><span>Open meeting report automatically</span><input type="checkbox" id="openDashboard" /></label>
      <label><span>Desktop notifications</span><input type="checkbox" id="notifications" /></label>
      <div class="field">
        <label>Recording quality</label>
        <select id="recordingQuality">
          <option value="low">Low (smaller files)</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="field">
        <label>Language</label>
        <input id="language" type="text" value="en-US" />
      </div>
    </section>

    <section>
      <h2>Appearance</h2>
      <label><span>Dark mode (popup)</span><input type="checkbox" id="darkMode" checked /></label>
    </section>

    <button id="save">Save Settings</button>
    <p id="status" class="status" hidden>Saved successfully.</p>
    <script src="options/options.js"></script>
  </body>
</html>
