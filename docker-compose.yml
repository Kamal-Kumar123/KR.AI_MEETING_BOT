services:
  # Postgres removed — use Neon (free cloud PostgreSQL). See docs/NEON_SETUP.md
  # Or SQLite locally: DATABASE_URL=sqlite:///./krai_local.db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  celery-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./krai_local.db}
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "true"
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin123
      S3_BUCKET: krai-recordings
      S3_USE_SSL: "false"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      - redis
      - minio
    volumes:
      - ./apps/api:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  minio_data:
