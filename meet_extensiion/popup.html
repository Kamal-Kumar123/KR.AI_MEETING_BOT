<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
    }
    h3 {
      color: #38bdf8;
      margin: 0 0 12px;
      text-align: center;
    }
    .subtitle {
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 14px;
    }
    label {
      font-size: 12px;
      color: #94a3b8;
      display: block;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      margin-bottom: 10px;
      border-radius: 4px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 12px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin: 4px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
    }
    #startBtn { background: #2563eb; color: white; }
    #startBtn:hover { background: #1d4ed8; }
    #finishBtn { background: #059669; color: white; }
    #finishBtn:hover { background: #047857; }
    #finishBtn:disabled { background: #475569; cursor: not-allowed; }
    #status {
      margin-top: 10px;
      padding: 10px;
      background: #1e293b;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      border: 1px solid #334155;
    }
    #transcript {
      height: 120px;
      overflow-y: auto;
      border: 1px solid #334155;
      padding: 8px;
      margin: 10px 0;
      background: #1e293b;
      border-radius: 6px;
      font-size: 11px;
      color: #cbd5e1;
    }
    .tip {
      font-size: 10px;
      color: #64748b;
      margin-top: 8px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h3>KRAI Meeting Assistant</h3>
  <p class="subtitle">For Zoom hosts — capture & share meeting summary</p>

  <label>Meeting type</label>
  <select id="meetingMode">
    <option value="standalone">Standalone (one-off meeting)</option>
    <option value="connected">Connected (same series / project)</option>
  </select>

  <label id="seriesLabel" style="display:none">Series ID (for connected meetings)</label>
  <input type="text" id="seriesId" placeholder="e.g. team-weekly-standup" style="display:none" />

  <button id="startBtn">Start Meeting Capture</button>
  <button id="finishBtn" disabled>End Meeting & Open Share Page</button>

  <div id="transcript"></div>
  <div id="status">Open a Zoom meeting tab, then click Start.</div>

  <p class="tip">Tip: For all voices, record Zoom locally and upload .mp4 on the website instead.</p>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
