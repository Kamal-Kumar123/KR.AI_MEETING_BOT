<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeetingBot - AI-Powered Meeting Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            keyframes: {
              shineMove: {
                '0%': { transform: 'translateX(-100%) skewX(-40deg)' },
                '100%': { transform: 'translateX(200%) skewX(-40deg)' },
              },
              smoothScaleFadeIn: {
                '0%': { opacity: '0', transform: 'scale(0.96)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              riseFadeOut: {
                '0%': { opacity: '0', transform: 'translateY(24px)' },
                '40%': { opacity: '1', transform: 'translateY(0)' },
                '100%': { opacity: '0', transform: 'translateY(-24px)' },
              },
              borderMove: {
                '0%, 100%': { borderColor: '#ec4899' },
                '33%': { borderColor: '#eab308' },
                '66%': { borderColor: '#22c55e' },
              },
            },
            animation: {
              shineMove: 'shineMove 2.5s linear infinite',
              smoothScaleFadeIn: 'smoothScaleFadeIn 0.6s ease-out',
              riseFadeOut: 'riseFadeOut 2s ease-in-out forwards',
              borderMove: 'borderMove 4s linear infinite',
            },
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
